<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1c1a;
    --surface: #252522;
    --border: #ffffff0d;
    --text: #f0efe8;
    --muted: #6a6a5a;
    --yellow: #FFCC00;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', 'Segoe UI', sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: #111110;
    border-bottom: 1px solid #FFCC0022;
    padding: 14px 28px;
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-logo {
    width: 36px; height: 36px; background: #FFCC00;
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-weight: 900; font-size: 14px;
    color: #111110; letter-spacing: -0.5px; flex-shrink: 0;
  }
  .topbar-title h1 {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 400;
    color: var(--text); letter-spacing: -0.3px;
  }
  .topbar-title span { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
  .topbar-right { display: flex; gap: 8px; align-items: center; }

  /* ── TABS ROW ── */
  .tabs-row {
    padding: 0 28px; background: #111110;
    border-bottom: 1px solid #FFCC0022;
    display: flex; align-items: stretch; gap: 0;
    overflow-x: auto;
  }
  .tabs-row::-webkit-scrollbar { height: 0; }

  .tab-btn {
    background: none; border: none;
    border-bottom: 3px solid transparent;
    padding: 13px 20px 10px;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--muted);
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; gap: 7px;
    white-space: nowrap; position: relative;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: #FFCC00; }
  .tab-badge {
    background: #ffffff12; border-radius: 10px;
    padding: 1px 7px; font-size: 11px; font-weight: 700; color: #FFCC00;
  }
  .tab-btn.active .tab-badge { background: #FFCC00; color: #111110; }
  .tab-remove {
    display: none; background: none; border: none;
    color: #444; font-size: 15px; cursor: pointer;
    padding: 0 0 0 2px; line-height: 1; transition: color 0.15s;
  }
  .tab-btn:hover .tab-remove,
  .tab-btn.active .tab-remove { display: inline; }
  .tab-remove:hover { color: #FFCC00; }

  .tab-add-team {
    background: none; border: none;
    border-bottom: 3px solid transparent;
    padding: 13px 18px 10px;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; color: #3a3a30;
    transition: color 0.2s;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .tab-add-team:hover { color: #FFCC00; }

  .tab-new-team-form {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  }
  .tab-new-team-input {
    background: #1c1c1a; border: 1px solid #FFCC0055;
    border-radius: 6px; color: var(--text);
    padding: 5px 10px; font-size: 13px;
    font-family: var(--font-body); outline: none; width: 150px;
  }
  .tab-new-team-input:focus { border-color: #FFCC00; }
  .tab-new-team-ok {
    background: #FFCC00; border: none; border-radius: 6px;
    padding: 5px 12px; font-size: 12px; font-weight: 700;
    color: #111110; cursor: pointer; font-family: var(--font-body);
  }
  .tab-new-team-cancel {
    background: none; border: 1px solid #2a2a20; border-radius: 6px;
    padding: 5px 10px; font-size: 12px; color: #555;
    cursor: pointer; font-family: var(--font-body);
  }

  /* ── BOARD ── */
  .board-wrap { padding: 24px 28px 40px; }
  .board { display: flex; gap: 14px; align-items: flex-start; overflow-x: auto; padding-bottom: 12px; }

  /* ── COLUMN ── */
  .col {
    background: #252522; border: 1px solid #FFCC0018;
    border-radius: 14px; padding: 16px;
    min-width: 230px; flex: 1; max-width: 320px;
    transition: border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .col.drag-over {
    border-color: #FFCC00 !important;
    box-shadow: 0 0 24px #FFCC0022;
  }
  .col-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 14px; gap: 8px;
  }
  .col-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.8px;
    text-transform: uppercase; color: #FFCC00; margin-bottom: 2px;
  }
  .col-count { font-size: 11px; color: var(--muted); }
  .col-remove-btn {
    background: none; border: none; color: #333;
    cursor: pointer; font-size: 18px; line-height: 1;
    padding: 2px 5px; border-radius: 4px; transition: color 0.15s;
  }
  .col-remove-btn:hover { color: #FFCC00; }

  /* ── TASK CARDS ── */
  .tasks-list { flex: 1; min-height: 50px; }
  .task-card {
    background: #1e1e1a;
    border: 1px solid #FFCC0015;
    border-left: 3px solid #FFCC00;
    border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    cursor: grab; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    user-select: none;
  }
  .task-card:active { cursor: grabbing; opacity: 0.8; }
  .task-card:hover { transform: translateX(3px); box-shadow: 0 4px 18px #FFCC0018; }
  .task-card.dragging { opacity: 0.4; }
  .task-inner { display: flex; align-items: flex-start; gap: 10px; }
  .task-check {
    width: 18px; height: 18px; min-width: 18px;
    border: 2px solid #FFCC00; border-radius: 4px; margin-top: 2px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; flex-shrink: 0;
  }
  .task-check:hover { background: #FFCC0030; }
  .task-check svg { display: none; width: 10px; height: 10px; }
  .task-check:hover svg { display: block; }
  .task-body { flex: 1; }
  .task-text { color: var(--text); font-size: 14px; line-height: 1.45; }
  .task-meta { font-size: 11px; color: #FFCC0066; margin-top: 4px; }
  .empty-hint { color: #2e2e28; font-size: 12px; text-align: center; padding: 18px 0; font-style: italic; }

  /* ── ADD TASK ── */
  .add-task-btn {
    margin-top: 8px; width: 100%; background: transparent;
    border: 1px dashed #FFCC0028; border-radius: 6px;
    color: #FFCC0055; cursor: pointer; padding: 7px;
    font-size: 12px; font-family: var(--font-body); transition: all 0.2s;
  }
  .add-task-btn:hover { border-color: #FFCC00; color: #FFCC00; }
  .add-task-form { margin-top: 8px; }
  .add-task-form textarea {
    width: 100%; background: #1e1e1a;
    border: 1px solid #FFCC0035; border-radius: 6px;
    color: var(--text); font-size: 13px; padding: 8px;
    resize: none; outline: none; font-family: var(--font-body);
  }
  .add-task-form textarea:focus { border-color: #FFCC00; }
  .form-btns { display: flex; gap: 6px; margin-top: 6px; }
  .btn-add {
    flex: 1; border: none; border-radius: 6px; padding: 6px;
    cursor: pointer; font-size: 12px; font-weight: 700;
    font-family: var(--font-body); background: #FFCC00; color: #111110;
  }
  .btn-cancel {
    flex: 1; background: transparent; border: 1px solid #2a2a20;
    border-radius: 6px; color: #555; padding: 6px; cursor: pointer;
    font-size: 12px; font-family: var(--font-body);
  }

  /* ── ADD MEMBER COL ── */
  .add-member-col {
    min-width: 150px; flex: 0 0 auto; background: transparent;
    border: 1px dashed #2a2a22; border-radius: 14px; padding: 20px 14px;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; cursor: pointer; transition: border-color 0.2s;
  }
  .add-member-col:hover { border-color: #FFCC0044; }
  .add-member-input {
    width: 100%; background: #1c1c1a; border: 1px solid #FFCC0044;
    border-radius: 8px; color: var(--text); padding: 8px 10px;
    font-size: 13px; outline: none; font-family: var(--font-body);
  }
  .add-member-input:focus { border-color: #FFCC00; }

  /* ── GLOBAL BTNS ── */
  .btn-ghost {
    background: #1e1e1c; border: 1px solid #2e2e28; color: var(--text);
    border-radius: 8px; padding: 7px 14px; cursor: pointer;
    font-size: 12px; font-family: var(--font-body); font-weight: 500;
    transition: border-color 0.2s; white-space: nowrap;
  }
  .btn-ghost:hover { border-color: #4a4a3a; }
  .btn-archive { border-color: #FFCC0033; color: #FFCC00; }
  .btn-archive:hover { border-color: #FFCC00; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 300px; gap: 16px;
    color: var(--muted); text-align: center;
  }
  .empty-state-icon { font-size: 40px; opacity: 0.3; }
  .empty-state-btn {
    background: #FFCC00; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 13px; font-weight: 700;
    color: #111110; cursor: pointer; font-family: var(--font-body);
  }

  /* ── ARCHIVE MODAL ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: #000000cc;
    z-index: 500; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #252522; border: 1px solid #FFCC0033;
    border-radius: 16px; padding: 28px; max-width: 580px;
    width: 92%; max-height: 80vh; overflow-y: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: var(--font-display); font-size: 18px; color: #FFCC00; font-weight: 400; }
  .modal-close {
    background: none; border: 1px solid #FFCC0033; color: #FFCC00;
    border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px;
  }
  .archive-team-heading {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2a22;
  }
  .archive-group-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 8px; margin-top: 14px; color: #FFCC00;
  }
  .archive-item { border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; border-left: 3px solid #FFCC0033; background: #1e1e1a; }
  .archive-item-text { font-size: 13px; color: #555; text-decoration: line-through; }
  .archive-item-meta { font-size: 11px; color: #333; margin-top: 3px; }
  .archive-empty { color: #444; text-align: center; padding: 24px 0; font-size: 13px; }

  .hint-bar { text-align: center; font-size: 11px; color: #2e2e28; margin-top: 24px; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a22; border-radius: 10px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">TP</div>
    <div class="topbar-title">
      <h1>Team Planner</h1>
      <span id="global-stats">0 active · 0 completed</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-ghost btn-archive" onclick="openArchive()">✓ Archive (<span id="archive-count">0</span>)</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs-row" id="tabs-row"></div>

<!-- BOARD -->
<div class="board-wrap">
  <div class="board" id="board"></div>
  <div class="hint-bar">Drag tasks between columns · Check ✓ to complete &amp; archive · Use + buttons to add teams and members · × to remove</div>
</div>

<!-- ARCHIVE MODAL -->
<div class="modal-backdrop" id="archive-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✓ Completed Archive</span>
      <button class="modal-close" onclick="closeArchive()">Close</button>
    </div>
    <div id="archive-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
const state = {
  activeTeam: 'chantal',
  addingTeam: false,
  teams: [
    { id: 'chantal',    name: 'Team Chantal',  members: ['Team Chantal']  },
    { id: 'niko',       name: 'Team Niko',     members: ['Team Niko']     },
    { id: 'leadership', name: 'CS Leadership', members: ['CS Leadership'] },
  ],
  tasks: {
    chantal:    { 'Team Chantal':  [] },
    niko:       { 'Team Niko':     [] },
    leadership: { 'CS Leadership': [] },
  },
  archive: [],
  drag: { id: null, fromMember: null, fromTeam: null },
};

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function genId()  { return Math.random().toString(36).slice(2, 9); }
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
    + ' · ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────
function render() {
  renderTabs();
  renderBoard();
  updateStats();
}

/* ── TABS ── */
function renderTabs() {
  const row = document.getElementById('tabs-row');
  row.innerHTML = '';

  state.teams.forEach(team => {
    const total = Object.values(state.tasks[team.id] || {}).reduce((s, a) => s + a.length, 0);
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (state.activeTeam === team.id ? ' active' : '');
    btn.innerHTML = `
      <span>${escHtml(team.name)}</span>
      <span class="tab-badge">${total}</span>
      <span class="tab-remove" title="Remove team">×</span>`;

    btn.addEventListener('click', e => {
      if (e.target.classList.contains('tab-remove')) return;
      state.activeTeam = team.id;
      state.addingTeam = false;
      render();
    });
    btn.querySelector('.tab-remove').addEventListener('click', e => {
      e.stopPropagation();
      removeTeam(team.id);
    });
    row.appendChild(btn);
  });

  // Add Team button / inline form
  if (state.addingTeam) {
    const form = document.createElement('div');
    form.className = 'tab-new-team-form';
    form.innerHTML = `
      <input class="tab-new-team-input" placeholder="Team name…" maxlength="40"/>
      <button class="tab-new-team-ok">Add</button>
      <button class="tab-new-team-cancel">✕</button>`;
    row.appendChild(form);
    const input = form.querySelector('.tab-new-team-input');
    setTimeout(() => input.focus(), 0);

    const doAdd = () => {
      const name = input.value.trim();
      if (!name) return;
      const id = 'team_' + genId();
      state.teams.push({ id, name, members: [name] });
      state.tasks[id] = { [name]: [] };
      state.activeTeam = id;
      state.addingTeam = false;
      render();
    };
    form.querySelector('.tab-new-team-ok').onclick = doAdd;
    form.querySelector('.tab-new-team-cancel').onclick = () => { state.addingTeam = false; render(); };
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') doAdd();
      if (e.key === 'Escape') { state.addingTeam = false; render(); }
    });
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'tab-add-team';
    addBtn.innerHTML = `<span style="font-size:16px;line-height:1">+</span> Add Team`;
    addBtn.onclick = () => { state.addingTeam = true; render(); };
    row.appendChild(addBtn);
  }
}

/* ── BOARD ── */
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const team = state.teams.find(t => t.id === state.activeTeam);

  if (!team) {
    board.innerHTML = `
      <div class="empty-state" style="width:100%">
        <div class="empty-state-icon">📋</div>
        <div style="font-size:14px;color:#555">No teams yet. Create your first one above.</div>
        <button class="empty-state-btn" onclick="state.addingTeam=true;render()">+ Add Team</button>
      </div>`;
    return;
  }

  team.members.forEach(member => board.appendChild(makeColumn(team, member)));
  board.appendChild(makeAddMemberCol(team));
}

/* ── COLUMN ── */
function makeColumn(team, member) {
  const isTeamCol = member === team.members[0];
  const tasks = (state.tasks[team.id] || {})[member] || [];

  const col = document.createElement('div');
  col.className = 'col';
  col.dataset.member = member;
  col.dataset.team = team.id;

  col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
  col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
  col.addEventListener('drop', e => { e.preventDefault(); col.classList.remove('drag-over'); handleDrop(team.id, member); });

  // Header
  const header = document.createElement('div');
  header.className = 'col-header';
  const titleGroup = document.createElement('div');
  titleGroup.innerHTML = `
    <div class="col-label">${isTeamCol ? '🏢 ' : '👤 '}${escHtml(member)}</div>
    <div class="col-count">${tasks.length} task${tasks.length !== 1 ? 's' : ''}</div>`;
  header.appendChild(titleGroup);
  if (!isTeamCol) {
    const rm = document.createElement('button');
    rm.className = 'col-remove-btn';
    rm.title = 'Remove member';
    rm.textContent = '×';
    rm.onclick = () => removeMember(team.id, member);
    header.appendChild(rm);
  }
  col.appendChild(header);

  // Task list
  const list = document.createElement('div');
  list.className = 'tasks-list';
  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty-hint">Drop tasks here</div>`;
  } else {
    tasks.forEach(task => list.appendChild(makeTaskCard(task, member, team.id)));
  }
  col.appendChild(list);

  // Add task btn
  const addBtn = document.createElement('button');
  addBtn.className = 'add-task-btn';
  addBtn.textContent = '+ Add Task';
  addBtn.onclick = () => showAddForm(col, addBtn, team.id, member);
  col.appendChild(addBtn);

  return col;
}

/* ── TASK CARD ── */
function makeTaskCard(task, member, teamId) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.draggable = true;
  card.dataset.id = task.id;
  card.innerHTML = `
    <div class="task-inner">
      <div class="task-check" title="Mark complete">
        <svg viewBox="0 0 10 8" fill="none" stroke="#FFCC00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1,4 4,7 9,1"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-text">${escHtml(task.text)}</div>
        <div class="task-meta">${fmtDate(task.createdAt)}</div>
      </div>
    </div>`;

  card.addEventListener('dragstart', e => {
    state.drag = { id: task.id, fromMember: member, fromTeam: teamId };
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.querySelector('.task-check').addEventListener('click', e => {
    e.stopPropagation();
    completeTask(teamId, member, task.id);
  });
  return card;
}

/* ── ADD MEMBER COLUMN ── */
function makeAddMemberCol(team) {
  const col = document.createElement('div');
  col.className = 'add-member-col';

  const plusLabel = document.createElement('div');
  plusLabel.style.textAlign = 'center';
  plusLabel.innerHTML = `
    <div style="color:#3a3a30;font-size:28px;line-height:1;">+</div>
    <div style="color:#3a3a30;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:6px;">Add Member</div>`;

  const input = document.createElement('input');
  input.className = 'add-member-input';
  input.placeholder = 'Member name…';
  input.style.display = 'none';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'tab-new-team-ok';
  confirmBtn.textContent = 'Add';
  confirmBtn.style.cssText = 'display:none;width:100%';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'tab-new-team-cancel';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'display:none;width:100%';

  const openForm = () => {
    plusLabel.style.display = 'none';
    input.style.display = 'block';
    confirmBtn.style.display = 'block';
    cancelBtn.style.display = 'block';
    col.style.borderColor = '#FFCC0055';
    input.focus();
  };

  const doAdd = () => {
    const name = input.value.trim();
    if (!name || team.members.includes(name)) { input.value = ''; return; }
    team.members.push(name);
    if (!state.tasks[team.id]) state.tasks[team.id] = {};
    state.tasks[team.id][name] = [];
    render();
  };

  col.addEventListener('click', e => { if (input.style.display === 'none') openForm(); });
  input.addEventListener('click', e => e.stopPropagation());
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doAdd();
    if (e.key === 'Escape') render();
    e.stopPropagation();
  });
  confirmBtn.addEventListener('click', e => { e.stopPropagation(); doAdd(); });
  cancelBtn.addEventListener('click',  e => { e.stopPropagation(); render(); });

  col.appendChild(plusLabel);
  col.appendChild(input);
  col.appendChild(confirmBtn);
  col.appendChild(cancelBtn);
  return col;
}

/* ── ADD TASK FORM ── */
function showAddForm(col, addBtn, teamId, member) {
  addBtn.remove();
  const form = document.createElement('div');
  form.className = 'add-task-form';
  form.innerHTML = `
    <textarea rows="2" placeholder="Task description… (Enter to add)"></textarea>
    <div class="form-btns">
      <button class="btn-add">Add</button>
      <button class="btn-cancel">Cancel</button>
    </div>`;
  col.appendChild(form);
  const ta = form.querySelector('textarea');
  ta.focus();

  const doAdd = () => {
    const text = ta.value.trim();
    if (!text) return;
    if (!state.tasks[teamId][member]) state.tasks[teamId][member] = [];
    state.tasks[teamId][member].push({ id: genId(), text, createdAt: Date.now() });
    render();
  };
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doAdd(); }
    if (e.key === 'Escape') render();
  });
  form.querySelector('.btn-add').onclick = doAdd;
  form.querySelector('.btn-cancel').onclick = () => render();
}

// ─────────────────────────────────────────
//  ACTIONS
// ─────────────────────────────────────────
function completeTask(teamId, member, id) {
  const list = (state.tasks[teamId] || {})[member] || [];
  const idx = list.findIndex(t => t.id === id);
  if (idx === -1) return;
  const [task] = list.splice(idx, 1);
  state.archive.push({ ...task, member, teamId, completedAt: Date.now() });
  const card = document.querySelector(`.task-card[data-id="${id}"]`);
  if (card) {
    card.style.transition = 'opacity 0.25s, transform 0.25s';
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    setTimeout(() => render(), 250);
  } else { render(); }
}

function handleDrop(toTeamId, toMember) {
  const { id, fromMember, fromTeam } = state.drag;
  if (!id) return;
  if (fromTeam === toTeamId && fromMember === toMember) return;
  const fromList = (state.tasks[fromTeam] || {})[fromMember] || [];
  const idx = fromList.findIndex(t => t.id === id);
  if (idx === -1) return;
  const [task] = fromList.splice(idx, 1);
  if (!state.tasks[toTeamId][toMember]) state.tasks[toTeamId][toMember] = [];
  state.tasks[toTeamId][toMember].push(task);
  state.drag = { id: null, fromMember: null, fromTeam: null };
  render();
}

function removeMember(teamId, member) {
  if (!confirm(`Remove "${member}" and their tasks from this team?`)) return;
  const team = state.teams.find(t => t.id === teamId);
  team.members = team.members.filter(m => m !== member);
  if (state.tasks[teamId]) delete state.tasks[teamId][member];
  render();
}

function removeTeam(teamId) {
  const team = state.teams.find(t => t.id === teamId);
  const taskCount = Object.values(state.tasks[teamId] || {}).reduce((s, a) => s + a.length, 0);
  const msg = taskCount > 0
    ? `Remove "${team.name}" and its ${taskCount} active task${taskCount !== 1 ? 's' : ''}?`
    : `Remove "${team.name}"?`;
  if (!confirm(msg)) return;
  state.teams = state.teams.filter(t => t.id !== teamId);
  delete state.tasks[teamId];
  state.activeTeam = state.teams.length ? state.teams[0].id : null;
  render();
}

function updateStats() {
  let total = 0;
  Object.values(state.tasks).forEach(t => Object.values(t).forEach(a => { total += a.length; }));
  const tc = state.teams.length;
  document.getElementById('global-stats').textContent =
    `${tc} team${tc !== 1 ? 's' : ''} · ${total} active · ${state.archive.length} completed`;
  document.getElementById('archive-count').textContent = state.archive.length;
}

// ─────────────────────────────────────────
//  ARCHIVE MODAL
// ─────────────────────────────────────────
function openArchive() {
  const body = document.getElementById('archive-body');
  if (state.archive.length === 0) {
    body.innerHTML = '<div class="archive-empty">No completed tasks yet.</div>';
  } else {
    const byTeam = {};
    state.archive.slice().reverse().forEach(t => {
      if (!byTeam[t.teamId]) byTeam[t.teamId] = {};
      if (!byTeam[t.teamId][t.member]) byTeam[t.teamId][t.member] = [];
      byTeam[t.teamId][t.member].push(t);
    });
    body.innerHTML = '';
    Object.entries(byTeam).forEach(([teamId, members]) => {
      const team = state.teams.find(t => t.id === teamId);
      const th = document.createElement('div');
      th.className = 'archive-team-heading';
      th.textContent = team ? team.name : teamId;
      body.appendChild(th);
      Object.entries(members).forEach(([member, items]) => {
        const lbl = document.createElement('div');
        lbl.className = 'archive-group-label';
        lbl.textContent = member;
        body.appendChild(lbl);
        items.forEach(t => {
          const item = document.createElement('div');
          item.className = 'archive-item';
          item.innerHTML = `
            <div class="archive-item-text">${escHtml(t.text)}</div>
            <div class="archive-item-meta">Added ${fmtDate(t.createdAt)} · Done ${fmtDate(t.completedAt)}</div>`;
          body.appendChild(item);
        });
      });
    });
  }
  document.getElementById('archive-modal').classList.add('open');
}

function closeArchive() {
  document.getElementById('archive-modal').classList.remove('open');
}
document.getElementById('archive-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeArchive();
});

// ─────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────
render();
</script>
</body>
</html>
